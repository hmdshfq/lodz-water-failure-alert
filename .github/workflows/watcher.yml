name: ZWiK Łódź water failure watcher

on:
  push:
    branches: [main]
  schedule:
    # Runs every 3 hours at the top of the hour (UTC). GitHub may delay busy
    # runners by a few minutes; that's fine for this use case.
    - cron: "0 */3 * * *"
  workflow_dispatch: {} # lets you trigger a manual run from the Actions tab

# Allow the job to push the updated state file back to the repo.
permissions:
  contents: write

concurrency:
  group: zwik-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run watcher
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEEDLE_PATTERN: ${{ secrets.NEEDLE_PATTERN }}
        run: python watcher.py

      - name: Persist state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update last_seen state [skip ci]"
          file_pattern: last_seen.txt
